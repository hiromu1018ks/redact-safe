<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RedactSafe</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>RedactSafe</h1>
        <nav>
          <button id="menu-file">ファイル</button>
          <button id="menu-settings">設定</button>
          <button id="menu-help">ヘルプ</button>
        </nav>
      </header>
      <main>
        <aside id="sidebar">
          <h2>検出一覧</h2>
          <p>PDFファイルを読み込んでください</p>
        </aside>
        <section id="viewer">
          <div id="warning-banner">
            自動検出には漏れがある可能性があります。全ページを目視で確認してください
          </div>
          <div id="pdf-container">
            <p>ファイルをドラッグ＆ドロップ、または「ファイル」メニューからPDFを選択してください</p>
            <div id="worker-test-panel" class="worker-test">
              <h3>Python Worker Test</h3>
              <div class="worker-test-row">
                <button id="btn-init-worker">Initialize Worker</button>
                <span id="worker-status">Not initialized</span>
              </div>
              <div class="worker-test-row">
                <button id="btn-ping" disabled>Send Ping</button>
                <input type="text" id="ping-message" placeholder="Message (optional)" value="hello" />
                <span id="ping-result"></span>
              </div>
            </div>
            <div id="audit-log-test-panel" class="worker-test">
              <h3>Audit Log Test</h3>
              <div class="worker-test-row">
                <button id="btn-log-event">Log Test Event</button>
                <button id="btn-verify-chain">Verify Chain</button>
                <span id="audit-log-result"></span>
              </div>
              <div class="worker-test-row">
                <label>Log dir:</label>
                <span id="log-dir">-</span>
              </div>
            </div>
            <div id="doc-state-test-panel" class="worker-test">
              <h3>Document State Test</h3>
              <div class="worker-test-row">
                <button id="btn-create-doc">Create Doc</button>
                <button id="btn-get-doc">Get Doc</button>
                <button id="btn-get-summary">Summary</button>
                <span id="doc-status-label">-</span>
              </div>
              <div class="worker-test-row">
                <button id="btn-add-page">Add Page</button>
                <button id="btn-add-region">Add Region</button>
                <button id="btn-toggle-region">Toggle Region</button>
                <button id="btn-remove-region">Remove Region</button>
              </div>
              <div class="worker-test-row">
                <button id="btn-all-on">All ON</button>
                <button id="btn-all-off">All OFF</button>
              </div>
              <div class="worker-test-row">
                <button id="btn-confirm-doc">Confirm</button>
                <button id="btn-rollback-doc">Rollback</button>
                <button id="btn-finalize-doc">Finalize</button>
              </div>
              <div class="worker-test-row">
                <label>Result:</label>
                <span id="doc-result" class="doc-result-text"></span>
              </div>
            </div>
          </div>
        </section>
      </main>
      <footer>
        <div id="toolbar">
          <button id="btn-all-on" disabled>全てON</button>
          <button id="btn-all-off" disabled>全てOFF</button>
          <span id="status-display">未読込</span>
          <button id="btn-finalize" disabled>確定して出力</button>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
